name: Build Dist Tarball

# 预构建分发：checkout openclaw@pin → 打 patches → pnpm build → camoufox-cli fork build
# → 打平台 tarball（含 portable Node）→ upload artifact / release asset。
# 用户侧 install.sh 只下 tarball 解压，零 pnpm build。
#
# v1：先只开 linux-x64，跑通再加 mac-arm64 / mac-x64 / win-x64（matrix include 已留好）。

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: '只 build 指定平台（留空 = matrix 全跑）'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - linux-x64
          - mac-arm64
          - mac-x64
          - win-x64

permissions:
  contents: write

concurrency:
  group: build-dist-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runs-on: ubuntu-24.04
            # node 24.15.0 与官方 install-cli.sh 默认对齐
            node_url: https://nodejs.org/dist/v24.15.0/node-v24.15.0-linux-x64.tar.xz
            node_archive_subdir: node-v24.15.0-linux-x64
            # mac-arm64 / mac-x64 / win-x64 先注释，linux-x64 绿了再开
          # - platform: mac-arm64
          #   runs-on: macos-latest
          #   node_url: https://nodejs.org/dist/v24.15.0/node-v24.15.0-darwin-arm64.tar.xz
          #   node_archive_subdir: node-v24.15.0-darwin-arm64
          # - platform: mac-x64
          #   runs-on: macos-13
          #   node_url: https://nodejs.org/dist/v24.15.0/node-v24.15.0-darwin-x64.tar.xz
          #   node_archive_subdir: node-v24.15.0-darwin-x64
          # - platform: win-x64
          #   runs-on: windows-latest
          #   node_url: https://nodejs.org/dist/v24.15.0/node-v24.15.0-win-x64.zip
          #   node_archive_subdir: node-v24.15.0-win-x64
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout xiaobei
        uses: actions/checkout@v4

      - name: Read pinned openclaw version
        id: pin
        run: |
          source openclaw.version
          echo "commit=$OPENCLAW_COMMIT" >> "$GITHUB_OUTPUT"
          echo "version=$OPENCLAW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node + pnpm (build env)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4

      - name: Clone openclaw at pinned commit
        run: |
          git init openclaw
          git -C openclaw remote add origin https://github.com/openclaw/openclaw.git
          git -C openclaw fetch --depth=1 origin ${{ steps.pin.outputs.commit }}
          git -C openclaw checkout FETCH_HEAD

      - name: Apply patches + pnpm install (no build, no crew, no restart)
        run: bash scripts/apply-addons.sh --no-build --no-restart --skip-crew

      - name: Build openclaw dist
        run: |
          cd openclaw
          NODE_OPTIONS=--max-old-space-size=8192 pnpm build
          NODE_OPTIONS=--max-old-space-size=8192 pnpm ui:build
        env:
          CI: 'true'

      - name: Prune dev deps（dist 已 build，运行时只需 prod deps）
        run: |
          cd openclaw
          pnpm install --prod --ignore-scripts --no-frozen-lockfile \
            --registry=https://registry.npmmirror.com \
            --fetch-retries=5 --fetch-timeout=600000

      - name: Build camoufox-cli fork (replaces upstream on PATH)
        run: bash patches/camoufox-cli/build.sh

      - name: Stage tarball
        id: stage
        run: |
          set -euo pipefail
          REPO="$GITHUB_WORKSPACE"
          STAGE="$RUNNER_TEMP/stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/bin" "$STAGE/tools"

          # 1. openclaw 引擎（dist 已 build，prod node_modules；排除 .git / 缓存）
          rsync -a --exclude='.git' --exclude='node_modules/.cache' --exclude='*.tsbuildinfo' \
            "$REPO/openclaw/" "$STAGE/openclaw/"
          # 探测 pnpm symlink 问题：node_modules 里软链指向全局 store 的话，tarball 到用户机会 dangling
          SYMLINK_COUNT=$(find "$STAGE/openclaw" -type l 2>/dev/null | wc -l)
          ABS_SYMLINKS=$(find "$STAGE/openclaw" -type l 2>/dev/null | while read l; do r=$(readlink "$l"); case "$r" in /*) echo x;; esac; done | wc -l)
          echo "ℹ️ openclaw symlinks: $SYMLINK_COUNT (absolute→dangling: $ABS_SYMLINKS)"

          # 2. portable Node 24.15.0
          curl -fsSL -o "$RUNNER_TEMP/node.tar.xz" "${{ matrix.node_url }}"
          tar -xJf "$RUNNER_TEMP/node.tar.xz" -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/${{ matrix.node_archive_subdir }}" "$STAGE/tools/node"

          # 3. wrapper：~/.openclaw/bin/openclaw → portable node + openclaw.mjs
          cat > "$STAGE/bin/openclaw" <<'EOF'
          #!/usr/bin/env bash
          HERE="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
          exec "$HERE/tools/node/bin/node" "$HERE/openclaw/openclaw.mjs" "$@"
          EOF
          chmod +x "$STAGE/bin/openclaw"

          # 4. xiaobei 模板与脚本（用户侧 install/setup-crew/apply-addons 复用）
          cp -a "$REPO/crews" "$STAGE/crews"
          cp -a "$REPO/skills" "$STAGE/skills"
          cp -a "$REPO/config-templates" "$STAGE/config-templates"
          cp -a "$REPO/scripts" "$STAGE/scripts"
          cp "$REPO/openclaw.version" "$REPO/version" "$STAGE/"

          # 5. 打包
          XIAOBEI_VER="$(tr -d '[:space:]' < "$REPO/version")"
          ASSET="xiaobei-${XIAOBEI_VER}-${{ matrix.platform }}.tar.zst"
          tar --zstd -cf "$RUNNER_TEMP/$ASSET" -C "$STAGE" .
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "asset_path=$RUNNER_TEMP/$ASSET" >> "$GITHUB_OUTPUT"
          ls -lh "$RUNNER_TEMP/$ASSET"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaobei-${{ matrix.platform }}
          path: ${{ steps.stage.outputs.asset_path }}
          retention-days: 14

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF##*/}" "${{ steps.stage.outputs.asset_path }}" --clobber
