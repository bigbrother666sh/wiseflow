name: Auto Release

on:
  pull_request_target:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

# 防止多个 PR 同时 merge 时并发触发重复 release
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # CI 已在 PR 期间验证过，此处直接做版本 bump + 打包发布
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine bump type from PR labels
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump_type }}" >> "$GITHUB_OUTPUT"
          else
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"major"'; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q '"minor"'; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(cat version | tr -d '[:space:]')
          NUM=${CURRENT#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$NUM"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          BUMP="${{ steps.bump.outputs.type }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
            # Auto-carry: patch 累积到 10 时自动晋升 minor
            if [ "$PATCH" -ge 10 ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            fi
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update version file
        run: echo "${{ steps.version.outputs.new }}" > version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git tag "${{ steps.version.outputs.new }}"
          git push origin master --tags

      - name: Read pinned openclaw version
        id: pin
        run: |
          source openclaw.version
          echo "commit=$OPENCLAW_COMMIT" >> "$GITHUB_OUTPUT"
          echo "version=$OPENCLAW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Clone openclaw at pinned commit
        run: |
          git init openclaw
          git -C openclaw remote add origin https://github.com/openclaw/openclaw.git
          git -C openclaw fetch --depth=1 origin ${{ steps.pin.outputs.commit }}
          git -C openclaw checkout FETCH_HEAD

      - name: Package release
        run: |
          RELEASE_DIR="wiseflow-${{ steps.version.outputs.new }}"
          # 复制整个项目到发布目录（保留 openclaw/.git 供 git apply --3way 使用）
          cp -r . "../$RELEASE_DIR"
          # 删除主仓库 .git 目录，保留 openclaw/.git
          rm -rf "../$RELEASE_DIR/.git"
          cd ..
          zip -r "$RELEASE_DIR.zip" "$RELEASE_DIR"
          mv "$RELEASE_DIR.zip" "$GITHUB_WORKSPACE/"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.new }}" \
            "wiseflow-${{ steps.version.outputs.new }}.zip" \
            --title "${{ steps.version.outputs.new }}" \
            --generate-notes

  docker:
    # PR merge 后构建 Docker 镜像并推送到阿里云容器镜像服务
    # 流程：checkout 最新（含 release job 提交的 version+tag）→ clone openclaw →
    #       docker build 多阶段镜像 → tag 版本号 + latest → push 阿里云
    needs: release
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
      ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}
      ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
      ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Read pinned openclaw version
        id: pin
        run: |
          source openclaw.version
          echo "commit=$OPENCLAW_COMMIT" >> "$GITHUB_OUTPUT"
          echo "version=$OPENCLAW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Clone openclaw at pinned commit
        run: |
          git init openclaw
          git -C openclaw remote add origin https://github.com/openclaw/openclaw.git
          git -C openclaw fetch --depth=1 origin ${{ steps.pin.outputs.commit }}
          git -C openclaw checkout FETCH_HEAD

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        run: |
          docker login -u "$ALIYUN_REGISTRY_USER" -p "$ALIYUN_REGISTRY_PASSWORD" "$ALIYUN_REGISTRY"

      - name: Build and push xiaobei image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAME_SPACE }}/xiaobei:${{ needs.release.outputs.new_version }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAME_SPACE }}/xiaobei:latest
