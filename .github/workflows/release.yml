name: Auto Release

on:
  pull_request_target:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

# 防止多个 PR 同时 merge 时并发触发重复 release
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # PR merge → bump version + push v* tag → 触发 build-dist.yml 出 4 平台 tarball + attach release。
    # tag push 用 GITHUB_TOKEN 不会触发下游 on:push workflow（递归保护），故这里主动
    # gh workflow run build-dist.yml（workflow_dispatch 是递归保护例外，GITHUB_TOKEN 可触发）。
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine bump type from PR labels
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.bump_type }}" >> "$GITHUB_OUTPUT"
          else
            LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"major"'; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q '"minor"'; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(cat version | tr -d '[:space:]')
          NUM=${CURRENT#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$NUM"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          BUMP="${{ steps.bump.outputs.type }}"
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
            # Auto-carry: patch 累积到 10 时自动晋升 minor
            if [ "$PATCH" -ge 10 ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            fi
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update version file
        run: echo "${{ steps.version.outputs.new }}" > version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git tag "${{ steps.version.outputs.new }}"
          git push origin master --tags

      - name: Trigger build-dist tarball workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.new }}"
          echo "Triggering build-dist.yml with tag=$TAG"
          gh workflow run build-dist.yml -f tag="$TAG"
