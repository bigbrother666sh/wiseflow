name: xiaobei

# Production compose file. Images are built and published by GitHub Actions;
# local validation can override IMAGE with `IMAGE=xiaobei:local` after running
# ./scripts/build-image.sh.
services:
  xiaobei:
    image: ${IMAGE:-registry.cn-hangzhou.aliyuncs.com/${ALIYUN_NAME_SPACE:-xiaobei}/xiaobei:latest}
    restart: unless-stopped
    environment:
      # The only required user-supplied setting. Other skill credentials are
      # configured later by the running agent in the persistent .env file.
      AWK_API_KEY: ${AWK_API_KEY:?Set AWK_API_KEY before starting xiaobei}
    ports:
      # Keep management surfaces local to the Docker host by default. Remote
      # access should use an SSH tunnel or a deliberately configured proxy.
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:6080:6080"
    cap_add:
      # Camoufox's Firefox sandbox needs this in the current container model.
      - SYS_ADMIN
    volumes:
      - xiaobei-openclaw:/root/.openclaw
      - xiaobei-camoufox:/root/.camoufox-cli

volumes:
  xiaobei-openclaw:
  xiaobei-camoufox:
